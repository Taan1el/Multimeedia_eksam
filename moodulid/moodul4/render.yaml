services:
  - type: web
    name: slow-pour-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build && npm run migrate
    startCommand: node app.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_MAX_AGE_MS
        value: "28800000"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CONTACT_FROM
        sync: false
